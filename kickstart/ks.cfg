# =============================================================================
# ks.cfg — Fedora 44 Everything, installation minimale automatisée
# =============================================================================
# Esprit Chris Titus : base minimale, SELinux enforcing, firewalld conservés.
# Interface : en_US · Formats : fr_CH · Clavier : ch (fr) · User : deby
#
# ⚠ Remplacer le hash du mot de passe :
#    python3 -c "import crypt; print(crypt.crypt('tonpass', crypt.mksalt(crypt.METHOD_SHA512)))"
# =============================================================================

text
skipx

# ── Locale & clavier (Swiss French) ──────────────────────────────────────────
lang en_US.UTF-8
keyboard --xlayouts='ch (fr)' --vckeymap=ch-fr
timezone Europe/Zurich --utc

# ── Réseau ────────────────────────────────────────────────────────────────────
network --bootproto=dhcp --hostname=deby-fedora --activate

# ── Comptes ───────────────────────────────────────────────────────────────────
rootpw --lock
user --name=deby --groups=wheel --gecos="Deby" --password=$6$CHANGEME$PLEASE_REPLACE_WITH_REAL_HASH --iscrypted

# ── Partitionnement (Btrfs, défaut Fedora, disque entier) ───────────────────
zerombr
clearpart --all --initlabel
autopart --type=btrfs

# ── Sécurité : les défauts Fedora sont conservés ─────────────────────────────
selinux --enforcing
firewall --enabled --service=ssh

# ── Services ──────────────────────────────────────────────────────────────────
services --enabled=NetworkManager,sshd

# ── Paquets : base minimale + outils pour le post-install ────────────────────
%packages
@core
@standard
git
curl
wget
ca-certificates
bash-completion
%end

# ── Post-install : clone du repo + exécution best-effort ─────────────────────
%post --log=/var/log/fedoraqtile-ks-post.log --erroronfail=false
git clone https://github.com/tonybeyond/fedoraqtile.git /opt/fedoraqtile || true
if [ -f /opt/fedoraqtile/scripts/post-install.sh ]; then
    bash /opt/fedoraqtile/scripts/post-install.sh > /var/log/fedoraqtile-setup.log 2>&1 || true
fi
%end

reboot

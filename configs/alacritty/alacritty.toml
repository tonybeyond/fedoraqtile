# Alacritty — terminal léger de secours (Doom One)
[font]
size = 12.0

[font.normal]
family = "Mononoki Nerd Font"
style = "Regular"

[colors.primary]
background = "#282c34"
foreground = "#bbc2cf"

[colors.normal]
black   = "#1c1f24"
red     = "#ff6c6b"
green   = "#98be65"
yellow  = "#ecbe7b"
blue    = "#51afef"
magenta = "#c678dd"
cyan    = "#46d9ff"
white   = "#bbc2cf"

[window]
padding = { x = 8, y = 8 }
opacity = 0.97
